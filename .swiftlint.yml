# .swiftlint.yml — TrackpadVolumeKnob

disabled_rules:
  - trailing_whitespace  # handled by editor

opt_in_rules:
  - array_init
  - closure_spacing
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_range_nil_comparison
  - discouraged_object_literal
  - empty_collection_literal
  - empty_string
  - explicit_init
  - fallthrough
  - fatal_error_message
  - file_header
  - first_where
  - force_unwrapping
  - implicitly_unwrapped_optional
  - joined_default_parameter
  - last_where
  - legacy_random
  - literal_expression_end_indentation
  - modifier_order
  - multiline_arguments
  - multiline_function_chains
  - multiline_parameters
  - operator_usage_whitespace
  - overridden_super_call
  - pattern_matching_keywords
  - prefer_self_type_over_type_of_self
  - private_action
  - private_outlet
  - prohibited_super_call
  - redundant_nil_coalescing
  - redundant_type_annotation
  - single_test_class
  - sorted_first_last
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - yoda_condition

included:
  - TrackpadVolumeKnob
  - TrackpadVolumeKnobTests

excluded:
  - .build
  - DerivedData

line_length:
  warning: 120
  error: 160
  ignores_comments: true
  ignores_urls: true

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 400
  error: 600

function_body_length:
  warning: 50
  error: 80

cyclomatic_complexity:
  warning: 12
  error: 20

identifier_name:
  min_length: 2
  excluded:
    - id
    - x
    - y
    - dt

file_header:
  required_pattern: "// .*\\.swift"

custom_rules:
  no_print:
    name: "No print statements"
    regex: '^\s*print\('
    message: "Use Logger.debug() instead of print()"
    severity: warning
